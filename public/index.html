<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a href="/dashboard" class="active">Training Log</a>
        <a href="/trophies">Trophy Room 🏆</a>
        <a href="/">Logout</a>
    </nav>

    <div class="container">
        <h1>COMMAND CENTER</h1>

        <div class="glass-card">
            <h3>Strength Progress</h3>
            <div style="height: 300px;">
                <canvas id="progressChart"></canvas>
            </div>
        </div>

        <div class="glass-card">
            <h3>Log Your Lift</h3>
            <form id="workout-form">
                <input type="text" id="exercise-name" placeholder="Which Exercise? (e.g. Deadlift)" required>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="weight" placeholder="Weight (kg)" required style="flex: 1;">
                    <input type="number" id="reps" placeholder="Reps" required style="flex: 1;">
                </div>
                <button type="submit">Save Progress</button>
            </form>
        </div>
    </div>

    <script>
        // 1. FETCH PR DATA AND DRAW THE GRAPH
        function loadChart() {
            fetch('/api/personal-records')
                .then(res => res.json())
                .then(data => {
                    const ctx = document.getElementById('progressChart').getContext('2d');

                    // Create gradients for the cinematic look
                    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                    gradient.addColorStop(0, 'rgba(0, 180, 216, 0.5)');
                    gradient.addColorStop(1, 'rgba(0, 180, 216, 0)');

                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.map(item => item.exercise_name),
                            datasets: [{
                                label: 'Max Weight (kg)',
                                data: data.map(item => item.max_weight),
                                borderColor: '#00b4d8',
                                borderWidth: 3,
                                tension: 0.4,
                                fill: true,
                                backgroundColor: gradient,
                                pointBackgroundColor: '#00b4d8'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#aaa' } },
                                x: { grid: { display: false }, ticks: { color: '#aaa' } }
                            }
                        }
                    });
                });
        }

        // 2. HANDLE FORM SUBMISSION
        document.getElementById('workout-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const exerciseName = document.getElementById('exercise-name').value;
            const weight = document.getElementById('weight').value;
            const reps = document.getElementById('reps').value;

            fetch('/api/add-set', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ exercise_name: exerciseName, weight: weight, reps: reps })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.isPR) {
                        alert("🔥 BOOM! New Personal Record for " + exerciseName + "!");
                    } else {
                        alert("Workout Logged!");
                    }
                    window.location.reload(); // Refresh to update the graph
                })
                .catch(err => alert("Error saving. Check your server.js and database!"));
        });

        // Initialize chart on load
        loadChart();
    </script>
</body>

</html>
