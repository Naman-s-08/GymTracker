<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gym Tracker | Trophy Room</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 50px;
        }

        .trophy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            padding: 40px;
            perspective: 1000px;
        }

        /* 3D Flip Card Logic */
        .card {
            width: 200px;
            height: 250px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .card:hover .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            border: 2px solid #e67e22;
        }

        .card-front {
            background: #2c3e50;
        }

        .card-back {
            background: #e67e22;
            color: white;
            transform: rotateY(180deg);
        }

        .medal {
            font-size: 60px;
        }

        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <button onclick="window.location.href='/dashboard'">Back to Gym</button>
    <h1>HALL OF FAME</h1>
    <p>Your Personal Records</p>

    <div class="trophy-grid" id="trophy-container">
    </div>

    <script>
        // Fetch the PRs from our Bridge (server.js)
        fetch('/api/personal-records')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('trophy-container');
                if (data.length === 0) {
                    container.innerHTML = "<h3>No records found. Go lift some weights!</h3>";
                }
                data.forEach(record => {
                    container.innerHTML += `
                    <div class="card">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="medal">🏆</div>
                                <h3>${record.exercise_name}</h3>
                            </div>
                            <div class="card-back">
                                <h1>${record.max_weight} kg</h1>
                                <p>PERSONAL BEST</p>
                            </div>
                        </div>
                    </div>
                `;
                });
            });
    </script>
</body>

</html>
