<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gym Tracker | Trophy Room</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="btn-auto" onclick="window.location.href='/dashboard'">Back to Gym</button>
    <h1>HALL OF FAME</h1>
    <p>Your Personal Records</p>

    <div class="trophy-grid" id="trophy-container">
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.location.href = '/'; 
        }

        // Fetch the PRs from our Bridge (server.js)
        fetch('/api/personal-records?userId=' + userId)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('trophy-container');
                if (data.length === 0) {
                    container.innerHTML = "<h3>No records found. Go lift some weights!</h3>";
                }
                data.forEach(record => {
                    container.innerHTML += `
                    <div class="card">
                        <div class="card-inner">
                            <div class="card-front">
                                <div class="medal">🏆</div>
                                <h3>${record.exercise_name}</h3>
                            </div>
                            <div class="card-back">
                                <h1>${record.max_weight} kg</h1>
                                <p>PERSONAL BEST</p>
                            </div>
                        </div>
                    </div>
                `;
                });
            });
    </script>
</body>

</html>
