<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker | Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="login-card">
        <h2>Enter the Vault</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button onclick="handleLogin()">Login</button>
        <p class="footer-text">Built for the GymRats | Train hard or stay the same</p>
    </div>

    <script>
        function handleLogin() {
            const usernameInput = document.getElementById('username').value.trim();
            if(!usernameInput) {
                alert("Please enter a username string!");
                return;
            }

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: usernameInput })
            })
            .then(res => res.json())
            .then(data => {
                if (data.userId) {
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    
                    const card = document.querySelector('.login-card');
                    card.style.transition = "0.5s";
                    card.style.opacity = "0";
                    card.style.transform = "scale(0.9)";

                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 500);
                } else {
                    alert("Login failed.");
                }
            })
            .catch(err => console.error("Login Server Error", err));
        }
    </script>
</body>

</html>
